server:
  port: 8081

spring:
  application:
    name: equipment
  datasource:
    url: jdbc:postgresql://localhost:5432/equipment_db
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: admin
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true
